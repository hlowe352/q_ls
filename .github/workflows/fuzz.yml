name: nightly fuzz

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: parse target (10 min)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            crates/parser/fuzz

      - name: install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: fuzz parse target
        working-directory: crates/parser
        # See ci.yml: force the gnu target so ASan can link against glibc.
        run: cargo fuzz run --target x86_64-unknown-linux-gnu parse -- -max_total_time=600 -timeout=10

      - name: upload crashes
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: crates/parser/fuzz/artifacts/
