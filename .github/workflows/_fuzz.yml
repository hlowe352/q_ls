name: _fuzz

on:
  workflow_call:
    inputs:
      max_total_time:
        description: "Seconds to fuzz for"
        type: number
        required: true
      artifact_name:
        description: "Name to give the uploaded crash artifacts on failure"
        type: string
        required: true
      timeout_minutes:
        description: "Job-level timeout in minutes (safety net above max_total_time)"
        type: number
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: parse target
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            crates/parser/fuzz

      - name: install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: fuzz parse target
        working-directory: crates/parser
        env:
          MAX_TIME: ${{ inputs.max_total_time }}
        # taiki-e/install-action ships a musl-linked cargo-fuzz binary that
        # defaults its build to x86_64-unknown-linux-musl. ASan is
        # incompatible with statically linked libc, so force the gnu target
        # so the fuzzer links against glibc.
        run: cargo fuzz run --target x86_64-unknown-linux-gnu parse seeds/parse -- -max_total_time=$MAX_TIME -timeout=10

      - name: upload crashes
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: crates/parser/fuzz/artifacts/
